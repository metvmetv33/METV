name: nabii Stream Updater

on:
  schedule:
    # Her 6 saatte bir otomatik çalışır
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manuel olarak başlatma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Stream Updater
        run: python nabii.py # Script dosyanın adı update_tabii.py olmalı

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add stream/*.m3u8
          git commit -m "Auto-update: Tabii m3u8 links" || echo "No changes to commit"
          git push

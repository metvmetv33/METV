name: youtbee.py Live Stream Updater

on:
  schedule:
    - cron: '0 */6 * * *'   # 6 saatte bir çalışır
  workflow_dispatch:          # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'   # youtbee.py 3.9 ile uyumlu

      - name: Bağımlılıkları Yükle
        run: pip install requests urllib3 yt-dlp   # yt-dlp eklendi!

      - name: Kanal Linklerini Güncelle
        run: python youtbee.py

      - name: Değişiklikleri Kaydet ve Pushla
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "METV2 Klasörü Güncellendi: $(date +'%d-%m-%Y %H:%M')"
            git pull --rebase origin main
            git push origin main
          else
            echo "Herhangi bir değişiklik bulunamadı."
          fi

name: Film Botu Calistir
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu kopyala
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Yukle
        run: pip install requests beautifulsoup4 playwright

      - name: Playwright Chromium Kur
        run: playwright install chromium --with-deps

      - name: Botu Calistir
        run: python fulhdfilm.py

      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Film verileri güncellendi" || echo "Değişiklik yok."
          git push
